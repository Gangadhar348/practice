<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="practice3.css">

<body>
    <header> Employe Registration form</header>
    <div class="form-group">
       <label>First Name:</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label>Last Name:</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label>Employe ID:</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label>Emali:</label>
        <input type="text">
    </div>
    <div class="form-group">
        <label> Mobile Number:</label>
        <input type="tel">
    </div>
    <div class="form-group">
        <label>Gender:</label>
        <select>
            <option>Male</option>
            <option>Female</option>
        </select>
    </div>
    <div class="form-group">
        <label>Department:</label>
        <select>
            <option>HR</option>
            <option>Employe</option>
            <option>Mangement Team</option>
        </select>
    </div>
    <div class="form-group">
        <label>Address:</label>
        <textarea rows="4" cols="30"></textarea>
    </div>
    <div class="form-group">
        <label>Salary:</label>
        <input type="text">
    </div>


</body>
</html>
