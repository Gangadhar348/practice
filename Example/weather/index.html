<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Weather App
    </title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    
    <main class="main-container">


        <header class="input-container">
            <input class="city-input" placeholder="Search the city" type="text">
            <button class="Search-btn">
                <span       class="material-symbols-outlined">
                search
                </span>
            </button>
        </header>

        <section class="weather-info" style="display: none;" >
            <div class="location-date-container">
                <div class="location">
                    <i class="fa-solid fa-location-dot"></i>
                    <h4 class="country-txt">Jakarta</h4>
                </div>
                <h5 class="current-date-txt regular-txt">Web, 07 Aug</h5>
            </div>


            <div class="weather-summary-container">
                <img src="images/clouds.svg"  class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-text">29 °C</h1>
                    <h3 class="condition-txt regular-txt">Clouds</h3>
                </div>
            </div>

            <div class="weather-conditions-container">
                <div class="conidition-item">
                    <i class="fa-solid fa-droplet"></i>
                    <div class="conidition-info">
                        <h5 class="regular-txt">Humidity</h5>
                        <h5 class="humidity-value-txt">55%</h5>
                    </div>

                </div>
                <div class="conidition-item">
                    <i class="fa-solid fa-wind"></i>
                    <div class="conidition-info">
                        <h5 class="regular-txt">Wind Speed</h5>
                        <h5 class="wind-value-txt">2 M/s</h5>
                    </div>
                </div>


            <div class="forecast-items-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">29 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">29 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">29 °C</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-txt">05 Aug</h5>
                    <img src="images/thunderstorm.svg" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">29 °C</h5>
                </div>
            </div>
        </section>



      <section class="search-city section-message">
        <img  src="images/search-city.png">
        <div>
            <h1>Search City</h1>
            <h4 class="regular-txt">
                Find out the Weather conditions ot th city
            </h4>
        </div>
      </section>  


      <section class="not-found search-city section-message" style="display: none;">
        <img  src="images/not-found.png">
        <div>
            <h1>Error</h1>
            <h4 class="regular-txt">
               Not found out the City
            </h4>
        </div>
      </section>  

    </main>

</body>
<script src="script.js" defer></script>
</html>
