<!DOCTYPE html>
<html>
<head>
    <title>Complete DOM Master</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f7;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .highlight {
            background: yellow;
        }

        button {
            padding: 6px 12px;
            margin: 5px 0;
            cursor: pointer;
        }

        li {
            margin: 5px 0;
        }

        .red {
            color: red;
        }
    </style>
</head>
<body>

<h1 id="title">DOM Full Tutorial</h1>

<!-- 1 -->
<div class="box">
    <h3>1️⃣ querySelector Example</h3>
    <p class="para">Paragraph 1</p>
    <p class="para">Paragraph 2</p>
    <button onclick="useQuerySelector()">Change First Paragraph</button>
</div>

<!-- 2 -->
<div class="box">
    <h3>2️⃣ querySelectorAll Example</h3>
    <button onclick="useQuerySelectorAll()">Change All Paragraphs</button>
</div>

<!-- 3 -->
<div class="box">
    <h3>3️ getElementsByClassName</h3>
    <button onclick="useClassName()">Make All Red</button>
</div>

<!-- 4 -->
<div class="box">
    <h3>4️⃣ getElementsByTagName</h3>
    <button onclick="countParagraphs()">Count P Tags</button>
    <p id="countOutput"></p>
</div>

<!-- 5 -->
<div class="box">
    <h3>5️⃣ Create & Remove Elements</h3>
    <input type="text" id="itemInput" placeholder="Enter item">
    <button onclick="addItem()">Add Item</button>
    <button onclick="removeItem()">Remove Last</button>
    <ul id="list"></ul>
</div>

<!-- 6 -->
<div class="box">
    <h3>6️⃣ Attribute Handling</h3>
    <img id="image" src="https://via.placeholder.com/100">
    <br>
    <button onclick="toggleImage()">Toggle Image Size</button>
</div>

<!-- 7 -->
<div class="box">
    <h3>7️⃣ DOM Traversal</h3>
    <button onclick="showParent()">Show Parent of List</button>
    <p id="parentOutput"></p>
</div>

<!-- 8 -->
<div class="box">
    <h3>8️⃣ Form + addEventListener</h3>
    <form id="form">
        <input type="text" id="name" placeholder="Enter name">
        <button type="submit">Submit</button>
    </form>
    <p id="result"></p>
</div>

<script>

// 1️⃣ querySelector (selects FIRST match)
function useQuerySelector() {
    let firstPara = document.querySelector(".para");
    firstPara.textContent = "Changed using querySelector!";
}

// 2️⃣ querySelectorAll (selects ALL matches)
function useQuerySelectorAll() {
    let allParas = document.querySelectorAll(".para");
    
    allParas.forEach(function(p) {
        p.classList.toggle("highlight");
    });
}

// 3️⃣ getElementsByClassName
function useClassName() {
    let elements = document.getElementsByClassName("para");
    
    for (let i = 0; i < elements.length; i++) {
        elements[i].classList.add("red");
    }
}

// 4️⃣ getElementsByTagName
function countParagraphs() {
    let pTags = document.getElementsByTagName("p");
    document.getElementById("countOutput").textContent =
        "Total <p> tags: " + pTags.length;
}

// 5️⃣ createElement + append + remove
function addItem() {
    let input = document.getElementById("itemInput").value;

    let li = document.createElement("li");
    li.textContent = input;

    document.getElementById("list").append(li);

    document.getElementById("itemInput").value = "";
}

function removeItem() {
    let list = document.getElementById("list");

    if (list.lastElementChild) {
        list.removeChild(list.lastElementChild);
    }
}

// 6️⃣ setAttribute + getAttribute
function toggleImage() {
    let img = document.getElementById("image");

    let src = img.getAttribute("src");

    if (src.includes("100")) {
        img.setAttribute("src", "https://via.placeholder.com/150");
    } else {
        img.setAttribute("src", "https://via.placeholder.com/100");
    }
}

// 7️⃣ DOM Traversal
function showParent() {
    let list = document.getElementById("list");
    let parent = list.parentNode;

    document.getElementById("parentOutput").textContent =
        "Parent element is: " + parent.className;
}

// 8️⃣ addEventListener + event object
document.getElementById("form").addEventListener("submit", function(event) {

    event.preventDefault();

    let name = document.getElementById("name").value;

    document.getElementById("result").innerHTML =
        "Welcome <b>" + name + "</b> ";

});

</script>

</body>
</html>
