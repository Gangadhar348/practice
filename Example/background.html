<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        padding: 0;
        margin: 0;
        box-sizing: border-box;

    }
    .color-bg{
        height:150px;
        background-color:lightblue;
        text-align:center;
        line-height: 150px;

    }

    .image-bg{
        height: 250px;
        background-image: url("https://youmeandtrends.com/wp-content/uploads/2018/03/most-beautiful-flower-wallpaper-world-colourful-4-desktop-worlds-top-beautiful-flowers-images-photos-with-most-flower-wallpaper-world-colourful-high-quality-for-computer-colorful-latest.jpg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        
        color: white;
        text-align:center;
        line-height: 200px;

    }

    .gradient-bg{
        height:150px;
        color:beige;
        background:linear-gradient(to right,red,purple);
        text-align:center;
        line-height:150px;
    }

</style>

<body>
    <div class="color-bg">Background color</div>
    <div class="image-bg">Background Image</div>
    <div class="gradient-bg">Gradient Background</div>


</body>
</html>
